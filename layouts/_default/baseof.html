<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">

<head>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">

  <title>
    {{ block "title" . }}
      {{ .Params.meta_title | default (printf "%s - %s" .Title .Site.Title) }}
    {{ end }}
  </title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  {{ with .Params.description }}
  <meta name="description" content="{{ . }}">
  {{ end }}

  <style>

    :root {
      --primary-color: #1f1f1f;
      --text-color: #444;
      --bg-color: #ffffff;
      --border-color: #e9e9e9;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.7;
    }

    .wrapper {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 40px;
    }

    header {
      padding: 30px 0;
      border-bottom: 1px solid var(--border-color);

      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo img {
      height: 80px;
      width: auto;
      display: block;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 40px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 30px;
      margin: 0;
      padding: 0;
    }

    nav a {
      text-decoration: none;
      color: var(--primary-color);
      font-weight: 600;
      font-size: 18px;
    }

    nav a:hover {
      opacity: 0.7;
    }

    .language-switcher {
      display: flex;
      gap: 12px;
      font-size: 14px;
      text-transform: uppercase;
    }

    .language-switcher a {
      text-decoration: none;
      color: #777;
      font-weight: 600;
    }

    .language-switcher a.active {
      color: black;
    }

    main {
      padding: 60px 0;
    }

    h1 {
      color: var(--primary-color);
      font-size: 64px;
      line-height: 1.1;
      margin-bottom: 40px;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 40px auto;
    }

    footer {
      border-top: 1px solid var(--border-color);
      padding: 40px 0;
      text-align: center;
      color: #888;
      font-size: 14px;
    }

    @media (max-width: 900px) {

      .wrapper {
        padding: 0 20px;
      }

      header {
        flex-direction: column;
        gap: 20px;
      }

      .header-right {
        flex-direction: column;
        gap: 20px;
      }

      nav ul {
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
      }

      h1 {
        font-size: 42px;
      }

    }

  </style>

</head>

<body class='page {{ block "body_classes" . }}{{ end }}'>

<div class="wrapper">

<header>

  <div class="logo">

    <a href="{{ .Site.Home.RelPermalink }}">

      {{ if .Site.Params.logo_desktop }}
        <img
          src="{{ .Site.Params.logo_desktop | relURL }}"
          alt="{{ .Site.Title }}">
      {{ else }}
        {{ .Site.Title }}
      {{ end }}

    </a>

  </div>

  <div class="header-right">

    <nav>

      <ul>

        {{ range .Site.Menus.main }}

        <li>
          <a href="{{ .URL | relLangURL }}">
            {{ .Name }}
          </a>
        </li>

        {{ end }}

      </ul>

    </nav>

    <div class="language-switcher">

      <a href="/"
         class="{{ if eq .Site.Language.Lang "en" }}active{{ end }}">
         EN
      </a>

      <a href="/uk/"
         class="{{ if eq .Site.Language.Lang "uk" }}active{{ end }}">
         UA
      </a>

      <a href="/pt/"
         class="{{ if eq .Site.Language.Lang "pt" }}active{{ end }}">
         PT
      </a>

      <a href="/ru/"
         class="{{ if eq .Site.Language.Lang "ru" }}active{{ end }}">
         RU
      </a>

    </div>

  </div>

</header>

<main>

  {{ block "main" . }}{{ end }}

</main>

<footer>

  {{ .Site.Params.footer_copyright }}

</footer>

</div>

</body>
</html>
