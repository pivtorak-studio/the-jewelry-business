{{ define "main" }}

<div class="container">

  <h1>{{ .Title }}</h1>

  {{ .Content }}

  <div class="tool-grid">

    {{ range .RegularPages.ByWeight }}

      <article class="tool-card">

        <div class="tool-card__type">
          🧮 Calculator
        </div>

        <h2 class="tool-card__title">
          <a href="{{ .RelPermalink }}">
            {{ .Title }}
          </a>
        </h2>

        <p class="tool-card__summary">
          {{ .Description | default .Summary }}
        </p>

        <a class="tool-card__button" href="{{ .RelPermalink }}">
          Open →
        </a>

      </article>

    {{ end }}

  </div>

</div>

{{ end }}
