<div class="tool-grid">

{{ range .RegularPages.ByWeight }}

<div class="tool-card">

    <div class="tool-type">
        🧮 Calculator
    </div>

    <h3 class="tool-title">
        <a href="{{ .RelPermalink }}">
            {{ .Title }}
        </a>
    </h3>

    <div class="tool-summary">
        {{ with .Params.summary }}
            {{ . }}
        {{ else }}
            {{ .Summary }}
        {{ end }}
    </div>

    <div class="tool-tags">
        {{ .Params.discipline }}
    </div>

    <div class="tool-footer">
        <span class="tool-status">
            Professional Tool
        </span>

        <span class="tool-open">
            Open →
        </span>
    </div>

</div>

{{ end }}

</div>
