<header>

  <div class="logo">
    <a href="{{ .Site.Home.RelPermalink }}">
      {{ if .Site.Params.logo_desktop }}
        <img src="{{ .Site.Params.logo_desktop | relURL }}" alt="{{ .Site.Title }}">
      {{ else }}
        {{ .Site.Title }}
      {{ end }}
    </a>
  </div>

  <div class="header-right">

    <nav>
      <ul>
        {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL | relLangURL }}">
            {{ .Name }}
          </a>
        </li>
        {{ end }}
      </ul>
    </nav>

    {{/*
    {{ partial "search-button.html" . }}  
    */}}

    <div class="language-switcher" id="js-language-switcher">
      {{ range .Site.Languages }}
        <a href="/{{ if ne .Lang $.Site.DefaultContentLanguage }}{{ .Lang }}/{{ end }}" data-lang="{{ .Lang }}" class="{{ if eq .Lang $.Site.Language.Lang }}active{{ end }}">
          {{ .Lang }}
        </a>
      {{ end }}
    </div>

  </div>

</header>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    // Масив доступних перекладів для цієї сторінки, згенерований Hugo
    const translations = {
      {{ range .AllTranslations }}
        "{{ .Language.Lang }}": "{{ .Permalink }}",
      {{ end }}
    };

    // Якщо ми на сторінці, яка має переклади, підміняємо лінки в меню
    if (Object.keys(translations).length > 1) {
      const switcherLinks = document.querySelectorAll("#js-language-switcher a");
      switcherLinks.forEach(link => {
        const lang = link.getAttribute("data-lang");
        if (translations[lang]) {
          link.href = translations[lang];
        }
      });
    }
  });
</script>
