<header>

  <div class="logo">
    <a href="{{ .Site.Home.RelPermalink }}">

      {{ if .Site.Params.logo_desktop }}
        <img
          src="{{ .Site.Params.logo_desktop | relURL }}"
          alt="{{ .Site.Title }}">
      {{ else }}
        {{ .Site.Title }}
      {{ end }}

    </a>
  </div>

  <div class="header-right">

    <nav>
      <ul>

        {{ range .Site.Menus.main }}

        <li>
          <a href="{{ .URL | relLangURL }}">
            {{ .Name }}
          </a>
        </li>

        {{ end }}

      </ul>
    </nav>

    <div class="language-switcher">

      {{ if .IsTranslated }}

        {{ range .AllTranslations }}

          <a
            href="{{ .RelPermalink }}"
            lang="{{ .Language.Lang }}"
            hreflang="{{ .Language.Lang }}"
            class="{{ if eq .Language.Lang $.Language.Lang }}active{{ end }}"
          >
            {{ upper .Language.Lang }}
          </a>

        {{ end }}

      {{ end }}

    </div>

  </div>

</header>
